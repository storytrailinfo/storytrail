name: StoryTrail Nightly Pipeline

# Runs every hour, checking for any child whose story is due right now
# and sending it. Most hours it finds nobody due and does nothing;
# that's expected, not a bug.
#
# NOTE: GitHub's own "schedule" trigger was not reliably registering for
# this repo (a known, documented GitHub Actions platform issue as of
# 2026), so this workflow is triggered externally instead, via
# cron-job.org calling the repository_dispatch webhook every hour.
on:
  repository_dispatch:
    types: [hourly-trigger]
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Node Code

    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Run the pipeline
        run: node storytrail_run_pipeline.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
