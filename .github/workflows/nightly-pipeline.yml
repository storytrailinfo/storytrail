name: StoryTrail Nightly Pipeline

# Runs every hour, checking for any child whose story is due right now
# and sending it. Most hours it finds nobody due and does nothing;
# that's expected, not a bug.
#
# NOTE: GitHub's own "schedule" trigger has proven unreliable for this
# repo (a known, documented GitHub Actions platform issue) -- it fires
# inconsistently, sometimes going hours without triggering. The PRIMARY
# trigger is now repository_dispatch, called every hour by an external
# scheduler (cron-job.org), which is far more reliable. "schedule" is
# kept as a backup in case it happens to fire too -- redundancy, not
# the primary mechanism.
on:
  repository_dispatch:
    types: [hourly-trigger]
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Node Code

    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Run the pipeline
        run: node storytrail_run_pipeline.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
