name: StoryTrail Nightly Pipeline

# Runs every hour, on the hour, forever -- checks for any child whose
# story is due right now and sends it. Most hours it finds nobody due
# and does nothing; that's expected, not a bug.
# (Re-saved to force GitHub to re-register the schedule.)
on:
  schedule:
    - cron: "0 * * * *"
  # Lets you manually trigger a run from the GitHub Actions tab too,
  # useful for testing without waiting for the next hour.
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Node Code

    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Run the pipeline
        run: node storytrail_run_pipeline.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
