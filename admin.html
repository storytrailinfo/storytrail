<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Story Archive – StoryTrail Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --midnight: #080C24;
      --deep-navy: #0C1540;
      --periwinkle: #4A6FA5;
      --sky: #7BA7D4;
      --moon-glow: #C8D8F0;
      --cream: #EEF2FF;
      --gold: #F0C060;
      --gold-light: #FDE68A;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--midnight);
      color: var(--cream);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
    }

    h1 {
      font-family: 'Crimson Pro', serif;
      font-size: 1.8rem;
      font-weight: 400;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    /* Password gate */
    .gate {
      max-width: 360px;
      margin: 4rem auto;
      background: var(--deep-navy);
      border: 1px solid rgba(74, 111, 165, 0.4);
      border-radius: 20px;
      padding: 2rem;
      text-align: center;
    }

    .gate input {
      width: 100%;
      background: rgba(8, 12, 36, 0.6);
      border: 1px solid rgba(74, 111, 165, 0.35);
      border-radius: 10px;
      padding: 0.7rem 1rem;
      font-size: 0.95rem;
      color: var(--cream);
      margin: 1rem 0;
      outline: none;
    }

    .gate button {
      width: 100%;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--midnight);
      border: none;
      padding: 0.8rem;
      border-radius: 100px;
      font-weight: 600;
      cursor: pointer;
    }

    .gate-error {
      color: #F87171;
      font-size: 0.85rem;
      margin-top: 0.5rem;
      display: none;
    }

    /* Story list */
    #content { display: none; }

    .story-card {
      background: var(--deep-navy);
      border: 1px solid rgba(74, 111, 165, 0.3);
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
      cursor: pointer;
    }

    .story-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }

    .story-card-title {
      font-family: 'Crimson Pro', serif;
      font-size: 1.15rem;
    }

    .story-card-meta {
      font-size: 0.78rem;
      color: var(--periwinkle);
      white-space: nowrap;
    }

    .badge {
      display: inline-block;
      font-size: 0.68rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0.15rem 0.6rem;
      border-radius: 100px;
      margin-right: 0.5rem;
    }

    .badge-welcome {
      background: rgba(240, 192, 96, 0.15);
      color: var(--gold);
      border: 1px solid rgba(240, 192, 96, 0.4);
    }

    .badge-nightly {
      background: rgba(74, 111, 165, 0.15);
      color: var(--sky);
      border: 1px solid rgba(74, 111, 165, 0.35);
    }

    .story-full {
      display: none;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(74, 111, 165, 0.2);
      font-family: 'Crimson Pro', serif;
      font-size: 1.02rem;
      line-height: 1.75;
      color: var(--moon-glow);
      white-space: pre-wrap;
    }

    .empty {
      text-align: center;
      color: var(--periwinkle);
      padding: 3rem 0;
    }

    .loading {
      text-align: center;
      color: var(--periwinkle);
      padding: 2rem 0;
    }

    .sort-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }

    .sort-btn {
      background: none;
      border: 1px solid rgba(74, 111, 165, 0.35);
      color: var(--sky);
      font-size: 0.8rem;
      padding: 0.35rem 0.8rem;
      border-radius: 100px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }

    .sort-btn.active {
      background: rgba(240, 192, 96, 0.15);
      border-color: var(--gold);
      color: var(--gold);
    }
  </style>
</head>
<body>

  <div class="wrap">
    <h1>Story archive</h1>

    <div class="gate" id="gate">
      <p style="color: var(--sky); font-size: 0.9rem; margin-bottom: 0.5rem;">Enter the admin password</p>
      <input type="password" id="password-input" placeholder="Password" />
      <button onclick="checkPassword()">View stories</button>
      <p class="gate-error" id="gate-error">Incorrect password.</p>
    </div>

    <div id="content">
      <div class="sort-bar" id="sort-bar">
        <span style="color: var(--periwinkle); font-size: 0.85rem;">Sort:</span>
        <button class="sort-btn active" id="sort-newest" onclick="setSort('newest')">Newest first</button>
        <button class="sort-btn" id="sort-oldest" onclick="setSort('oldest')">Oldest first</button>
      </div>
      <div id="story-list"></div>
    </div>
  </div>

  <script>
    const EDGE_FUNCTION_URL = "https://ogdczdslclzplunbklaa.supabase.co/functions/v1/get-stories";
    // Same publishable key used on the enrollment page -- safe to expose
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_THFfVECYJDIG_B6XPJkWig_jnIEcBS2";

    let allStories = [];
    let currentSort = 'newest';

    async function checkPassword() {
      const password = document.getElementById('password-input').value;
      const errorEl = document.getElementById('gate-error');
      errorEl.style.display = 'none';

      document.getElementById('story-list').innerHTML = '<div class="loading">Loading stories...</div>';
      document.getElementById('gate').style.display = 'none';
      document.getElementById('content').style.display = 'block';

      try {
        const response = await fetch(EDGE_FUNCTION_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${SUPABASE_PUBLISHABLE_KEY}`,
            'apikey': SUPABASE_PUBLISHABLE_KEY,
          },
          body: JSON.stringify({ password }),
        });

        const result = await response.json();

        if (!response.ok) {
          // Wrong password -- go back to the gate
          document.getElementById('content').style.display = 'none';
          document.getElementById('gate').style.display = 'block';
          errorEl.style.display = 'block';
          return;
        }

        allStories = result.stories || [];
        renderStories();

      } catch (err) {
        document.getElementById('story-list').innerHTML = '<div class="empty">Something went wrong. Please try again.</div>';
      }
    }

    function setSort(sort) {
      currentSort = sort;
      document.getElementById('sort-newest').classList.toggle('active', sort === 'newest');
      document.getElementById('sort-oldest').classList.toggle('active', sort === 'oldest');
      renderStories();
    }

    function renderStories() {
      const listEl = document.getElementById('story-list');

      if (!allStories || allStories.length === 0) {
        listEl.innerHTML = '<div class="empty">No stories yet.</div>';
        return;
      }

      const sorted = [...allStories].sort((a, b) => {
        const diff = new Date(a.created_at) - new Date(b.created_at);
        return currentSort === 'newest' ? -diff : diff;
      });

      listEl.innerHTML = sorted.map((story, i) => {
        const date = new Date(story.created_at).toLocaleDateString('en-US', {
          month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit'
        });
        const badgeClass = story.send_type === 'welcome' ? 'badge-welcome' : 'badge-nightly';
        const badgeLabel = story.send_type === 'welcome' ? 'Welcome' : 'Nightly';

        const parent = story.children;
        const parentName = parent && parent.parent_first_name
          ? `${parent.parent_first_name} ${parent.parent_last_name || ''}`.trim()
          : null;
        const titleText = parentName
          ? `${parentName} — ${story.child_name}`
          : story.child_name;

        return `
          <div class="story-card" onclick="toggleStory(${i})">
            <div class="story-card-header">
              <div class="story-card-title">${escapeHtml(titleText)}</div>
              <div class="story-card-meta">${date}</div>
            </div>
            <div style="margin-top: 0.4rem;">
              <span class="badge ${badgeClass}">${badgeLabel}</span>
            </div>
            <div class="story-full" id="story-${i}">${escapeHtml(story.story_text)}</div>
          </div>
        `;
      }).join('');
    }

    function toggleStory(i) {
      const el = document.getElementById(`story-${i}`);
      el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Allow pressing Enter to submit the password
    document.getElementById('password-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') checkPassword();
    });
  </script>
</body>
</html>
