<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – StoryTrail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --midnight: #080C24;
      --deep-navy: #0C1540;
      --periwinkle: #4A6FA5;
      --sky: #7BA7D4;
      --moon-glow: #C8D8F0;
      --cream: #EEF2FF;
      --gold: #F0C060;
      --gold-light: #FDE68A;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--midnight);
      color: var(--cream);
      min-height: 100vh;
    }

    .gate {
      max-width: 360px;
      margin: 6rem auto;
      background: var(--deep-navy);
      border: 1px solid rgba(74, 111, 165, 0.4);
      border-radius: 20px;
      padding: 2rem;
      text-align: center;
    }

    .gate h1 {
      font-family: 'Crimson Pro', serif;
      font-size: 1.6rem;
      font-weight: 400;
      margin-bottom: 1.5rem;
    }

    .gate input {
      width: 100%;
      background: rgba(8, 12, 36, 0.6);
      border: 1px solid rgba(74, 111, 165, 0.35);
      border-radius: 10px;
      padding: 0.7rem 1rem;
      font-size: 0.95rem;
      color: var(--cream);
      margin: 1rem 0;
      outline: none;
    }

    .gate button {
      width: 100%;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--midnight);
      border: none;
      padding: 0.8rem;
      border-radius: 100px;
      font-weight: 600;
      cursor: pointer;
    }

    .gate-error {
      color: #F87171;
      font-size: 0.85rem;
      margin-top: 0.5rem;
      display: none;
    }

    #app { display: none; min-height: 100vh; }

    .layout { display: flex; min-height: 100vh; }

    .sidebar {
      width: 200px;
      flex-shrink: 0;
      background: var(--deep-navy);
      border-right: 1px solid rgba(74, 111, 165, 0.25);
      padding: 1.5rem 1rem;
    }

    .sidebar-logo {
      font-family: 'Crimson Pro', serif;
      font-size: 1.2rem;
      margin-bottom: 2rem;
      padding: 0 0.5rem;
    }

    .nav-item {
      display: block;
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      color: var(--sky);
      font-family: 'Inter', sans-serif;
      font-size: 0.92rem;
      padding: 0.65rem 0.9rem;
      border-radius: 10px;
      cursor: pointer;
      margin-bottom: 0.4rem;
    }

    .nav-item.active {
      background: rgba(240, 192, 96, 0.12);
      color: var(--gold);
      font-weight: 500;
    }

    .nav-item:hover:not(.active) {
      background: rgba(74, 111, 165, 0.12);
      color: var(--cream);
    }

    .main {
      flex: 1;
      padding: 2rem 2.5rem;
      max-width: 800px;
    }

    .main h1 {
      font-family: 'Crimson Pro', serif;
      font-size: 1.6rem;
      font-weight: 400;
      margin-bottom: 1.5rem;
    }

    .panel { display: none; }
    .panel.active { display: block; }

    .item-card {
      background: var(--deep-navy);
      border: 1px solid rgba(74, 111, 165, 0.3);
      border-radius: 16px;
      padding: 1.1rem 1.4rem;
      margin-bottom: 0.85rem;
      cursor: pointer;
    }

    .item-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .item-card-title {
      font-family: 'Crimson Pro', serif;
      font-size: 1.1rem;
    }

    .item-card-sub {
      font-size: 0.8rem;
      color: var(--sky);
      margin-top: 0.2rem;
    }

    .item-card-meta {
      font-size: 0.78rem;
      color: var(--periwinkle);
      white-space: nowrap;
      text-align: right;
      line-height: 1.5;
    }

    .badge {
      display: inline-block;
      font-size: 0.68rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0.15rem 0.6rem;
      border-radius: 100px;
      margin-right: 0.5rem;
    }

    .badge-welcome {
      background: rgba(240, 192, 96, 0.15);
      color: var(--gold);
      border: 1px solid rgba(240, 192, 96, 0.4);
    }

    .badge-nightly {
      background: rgba(74, 111, 165, 0.15);
      color: var(--sky);
      border: 1px solid rgba(74, 111, 165, 0.35);
    }

    .badge-active {
      background: rgba(99, 153, 34, 0.15);
      color: #97C459;
      border: 1px solid rgba(99, 153, 34, 0.4);
    }

    .badge-inactive {
      background: rgba(226, 75, 74, 0.12);
      color: #F09595;
      border: 1px solid rgba(226, 75, 74, 0.35);
    }

    .item-full {
      display: none;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(74, 111, 165, 0.2);
    }

    .story-text {
      font-family: 'Crimson Pro', serif;
      font-size: 1.02rem;
      line-height: 1.75;
      color: var(--moon-glow);
      white-space: pre-wrap;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 0.45rem 0;
      border-bottom: 1px solid rgba(74, 111, 165, 0.15);
      font-size: 0.88rem;
    }

    .detail-row:last-child { border-bottom: none; }

    .detail-label { color: var(--periwinkle); }
    .detail-value { color: var(--cream); text-align: right; }

    .empty {
      text-align: center;
      color: var(--periwinkle);
      padding: 3rem 0;
    }

    .loading {
      text-align: center;
      color: var(--periwinkle);
      padding: 2rem 0;
    }

    .sort-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }

    .sort-btn {
      background: none;
      border: 1px solid rgba(74, 111, 165, 0.35);
      color: var(--sky);
      font-size: 0.8rem;
      padding: 0.35rem 0.8rem;
      border-radius: 100px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }

    .sort-btn.active {
      background: rgba(240, 192, 96, 0.15);
      border-color: var(--gold);
      color: var(--gold);
    }

    .search-input {
      display: block;
      width: 100%;
      max-width: 360px;
      margin-bottom: 0.9rem;
      background: rgba(8, 12, 36, 0.6);
      border: 1px solid rgba(74, 111, 165, 0.35);
      border-radius: 10px;
      padding: 0.6rem 1rem;
      font-size: 0.88rem;
      font-family: 'Inter', sans-serif;
      color: var(--cream);
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input::placeholder { color: rgba(74, 111, 165, 0.6); }

    .search-input:focus {
      border-color: rgba(200, 216, 240, 0.6);
    }

    .resend-btn {
      background: rgba(240, 192, 96, 0.1);
      border: 1px solid rgba(240, 192, 96, 0.4);
      color: var(--gold);
      font-size: 0.78rem;
      font-family: 'Inter', sans-serif;
      padding: 0.25rem 0.75rem;
      border-radius: 100px;
      cursor: pointer;
      margin-left: auto;
    }

    .resend-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .copy-link-btn {
      display: block;
      margin-top: 1rem;
      width: 100%;
      background: rgba(74, 111, 165, 0.12);
      border: 1px solid rgba(74, 111, 165, 0.35);
      color: var(--sky);
      font-size: 0.82rem;
      font-family: 'Inter', sans-serif;
      padding: 0.55rem;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .copy-link-btn:hover {
      background: rgba(74, 111, 165, 0.2);
      color: var(--cream);
    }

    .unsubscribe-btn {
      display: block;
      margin-top: 0.6rem;
      width: 100%;
      background: rgba(226, 75, 74, 0.08);
      border: 1px solid rgba(226, 75, 74, 0.3);
      color: #F09595;
      font-size: 0.82rem;
      font-family: 'Inter', sans-serif;
      padding: 0.55rem;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .unsubscribe-btn:hover:not(:disabled) {
      background: rgba(226, 75, 74, 0.16);
    }

    .unsubscribe-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .already-inactive {
      margin-top: 0.6rem;
      text-align: center;
      font-size: 0.8rem;
      color: var(--periwinkle);
      padding: 0.5rem;
    }

    .error-block {
      margin-top: 0.6rem;
      padding: 0.6rem 0.8rem;
      background: rgba(226, 75, 74, 0.08);
      border: 1px solid rgba(226, 75, 74, 0.25);
      border-radius: 8px;
      font-size: 0.78rem;
      color: #F09595;
      font-family: monospace;
      word-break: break-word;
    }

    /* ── LOG TABLE ── */
    #panel-logs, #panel-users { max-width: none; }

    .log-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    .log-table th {
      text-align: left;
      padding: 0.6rem 0.9rem;
      color: var(--periwinkle);
      font-weight: 500;
      font-size: 0.72rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(74, 111, 165, 0.3);
      white-space: nowrap;
    }

    .log-table td {
      padding: 0.65rem 0.9rem;
      border-bottom: 1px solid rgba(74, 111, 165, 0.15);
      vertical-align: middle;
    }

    .log-table tr:hover td {
      background: rgba(74, 111, 165, 0.06);
    }

    .log-row-error td {
      border-bottom: none;
    }

    .log-row-error .error-block {
      margin: 0 0 0.5rem;
    }

    .log-name {
      font-weight: 500;
      color: var(--cream);
      min-width: 220px;
      white-space: nowrap;
    }
    .log-email { color: var(--sky); font-size: 0.8rem; }
    .log-date { color: var(--periwinkle); white-space: nowrap; font-size: 0.8rem; }

    .log-table .badge { margin-right: 0.35rem; }

    .email-content-scroll {
      max-height: 700px;
      overflow-y: auto;
      padding: 1rem 1.1rem;
      background: rgba(8, 12, 36, 0.4);
      border: 1px solid rgba(74, 111, 165, 0.2);
      border-radius: 10px;
      font-family: 'Crimson Pro', serif;
      font-size: 1rem;
      line-height: 1.75;
      color: var(--moon-glow);
      white-space: pre-wrap;
    }

    /* ── DASHBOARD ── */
    #panel-dashboard { max-width: none; }

    .dash-section-label {
      font-family: 'Crimson Pro', serif;
      font-size: 1.15rem;
      font-weight: 400;
      color: var(--gold);
      margin: 2.25rem 0 1.25rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(74, 111, 165, 0.2);
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .stat-card {
      background: var(--deep-navy);
      border: 1px solid rgba(74, 111, 165, 0.3);
      border-radius: 16px;
      padding: 1.25rem 1.4rem;
    }

    .stat-card-label {
      font-size: 0.75rem;
      color: var(--periwinkle);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.5rem;
    }

    .stat-card-value {
      font-family: 'Crimson Pro', serif;
      font-size: 2rem;
      color: var(--cream);
    }

    .stat-card-value.stat-good { color: #97C459; }
    .stat-card-value.stat-bad { color: #F09595; }

    @media (max-width: 640px) {
      .layout { flex-direction: column; }
      .sidebar {
        width: 100%;
        display: flex;
        gap: 0.5rem;
        padding: 1rem;
        border-right: none;
        border-bottom: 1px solid rgba(74, 111, 165, 0.25);
      }
      .sidebar-logo { display: none; }
      .nav-item { margin-bottom: 0; flex: 1; text-align: center; }
      .main { padding: 1.5rem 1.25rem; }
    }
  </style>
</head>
<body>

  <div class="gate" id="gate">
    <h1>StoryTrail Admin</h1>
    <p style="color: var(--sky); font-size: 0.9rem;">Enter the admin password</p>
    <input type="password" id="password-input" placeholder="Password" />
    <button onclick="checkPassword()">Enter</button>
    <p class="gate-error" id="gate-error">Incorrect password.</p>
  </div>

  <div id="app">
    <div class="layout">
      <div class="sidebar">
        <div class="sidebar-logo">Admin</div>
        <button class="nav-item active" id="nav-dashboard" onclick="switchPanel('dashboard')">Dashboard</button>
        <button class="nav-item" id="nav-users" onclick="switchPanel('users')">Users</button>
        <button class="nav-item" id="nav-logs" onclick="switchPanel('logs')">Email Logs</button>
      </div>

      <div class="main">
        <div class="panel active" id="panel-dashboard">
          <h1>Dashboard</h1>
          <div class="sort-bar">
            <span style="color: var(--periwinkle); font-size: 0.85rem;">Period:</span>
            <button class="sort-btn" id="dash-period-day" onclick="setDashPeriod('day')">Today</button>
            <button class="sort-btn" id="dash-period-week" onclick="setDashPeriod('week')">7 days</button>
            <button class="sort-btn" id="dash-period-month" onclick="setDashPeriod('month')">30 days</button>
            <button class="sort-btn active" id="dash-period-all" onclick="setDashPeriod('all')">All time</button>
          </div>
          <div class="stat-grid" id="dash-stat-grid">
            <div class="loading">Loading dashboard...</div>
          </div>

          <h2 class="dash-section-label">v2 (Sandbox)</h2>
          <div class="sort-bar">
            <span style="color: var(--periwinkle); font-size: 0.85rem;">Period:</span>
            <button class="sort-btn" id="dash-v2-period-day" onclick="setDashV2Period('day')">Today</button>
            <button class="sort-btn" id="dash-v2-period-week" onclick="setDashV2Period('week')">7 days</button>
            <button class="sort-btn" id="dash-v2-period-month" onclick="setDashV2Period('month')">30 days</button>
            <button class="sort-btn active" id="dash-v2-period-all" onclick="setDashV2Period('all')">All time</button>
          </div>
          <div class="stat-grid" id="dash-v2-stat-grid">
            <div class="loading">Loading v2 dashboard...</div>
          </div>
        </div>

        <div class="panel" id="panel-users">
          <h1>Users</h1>
          <input type="text" class="search-input" id="users-search" placeholder="Search by name or email..." oninput="renderUsers()" />
          <div class="sort-bar">
            <span style="color: var(--periwinkle); font-size: 0.85rem;">Sort:</span>
            <button class="sort-btn active" id="users-sort-created" onclick="setUsersSort('created')">Date Created ↓</button>
            <button class="sort-btn" id="users-sort-name" onclick="setUsersSort('name')">Name A–Z</button>
            <button class="sort-btn" id="users-sort-email" onclick="setUsersSort('email')">Email A–Z</button>
            <button class="sort-btn" id="users-sort-nextsend" onclick="setUsersSort('nextsend')">Next Send ↑</button>
          </div>
          <table class="log-table">
            <thead>
              <tr>
                <th>Parent</th>
                <th>Email</th>
                <th>Status</th>
                <th>Stories</th>
                <th>Date Created</th>
                <th>Next send</th>
              </tr>
            </thead>
            <tbody id="user-list"></tbody>
          </table>
        </div>

        <div class="panel" id="panel-logs">
          <h1>Email Logs</h1>
          <div class="sort-bar">
            <span style="color: var(--periwinkle); font-size: 0.85rem;">Filter:</span>
            <button class="sort-btn active" id="logs-filter-all" onclick="setLogsFilter('all')">All</button>
            <button class="sort-btn" id="logs-filter-failed" onclick="setLogsFilter('failed')">Failed only</button>
          </div>
          <table class="log-table">
            <thead>
              <tr>
                <th>Parent</th>
                <th>Email</th>
                <th>Type</th>
                <th>Status</th>
                <th>Date</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="log-list"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    const EDGE_FUNCTION_URL = "https://ogdczdslclzplunbklaa.supabase.co/functions/v1/get-stories";
    const RESEND_FUNCTION_URL = "https://ogdczdslclzplunbklaa.supabase.co/functions/v1/resend-email";
    const UNSUBSCRIBE_FUNCTION_URL = "https://ogdczdslclzplunbklaa.supabase.co/functions/v1/unsubscribe-child";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_THFfVECYJDIG_B6XPJkWig_jnIEcBS2";

    // v2 (sandbox) project -- entirely separate Supabase project, used
    // only for the v2 dashboard stats section below.
    const V2_DASHBOARD_FUNCTION_URL = "https://hehtzbzrziehwmeeeqqy.supabase.co/functions/v1/admin-v2-dashboard";
    const V2_SUPABASE_PUBLISHABLE_KEY = "sb_publishable__sJS00XeyI_Cwh_lvD8XBQ_DCr2Rp17";

    let dashV2Period = 'all';

    async function fetchV2Dashboard(period) {
      try {
        const response = await fetch(V2_DASHBOARD_FUNCTION_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${V2_SUPABASE_PUBLISHABLE_KEY}`,
            'apikey': V2_SUPABASE_PUBLISHABLE_KEY,
          },
          body: JSON.stringify({ password: adminPassword, period }),
        });
        if (!response.ok) return null;
        return await response.json();
      } catch (err) {
        return null;
      }
    }

    async function setDashV2Period(period) {
      dashV2Period = period;
      ['day', 'week', 'month', 'all'].forEach(p => {
        document.getElementById(`dash-v2-period-${p}`).classList.toggle('active', p === period);
      });
      document.getElementById('dash-v2-stat-grid').innerHTML = '<div class="loading">Loading v2 dashboard...</div>';
      const result = await fetchV2Dashboard(period);
      renderDashboardV2(result ? result.dashboard : null);
    }

    function renderDashboardV2(stats) {
      const gridEl = document.getElementById('dash-v2-stat-grid');
      if (!stats) {
        gridEl.innerHTML = '<div class="empty">Couldn\'t load v2 dashboard stats.</div>';
        return;
      }

      const rateDisplay = stats.conversionRate === null ? '—' : `${stats.conversionRate}%`;
      const rateNote = stats.resolvedCount > 0
        ? `${stats.convertedCount} of ${stats.resolvedCount} resolved trials`
        : 'No resolved trials yet';

      gridEl.innerHTML = `
        <div class="stat-card">
          <div class="stat-card-label">Active trials</div>
          <div class="stat-card-value">${stats.activeTrials}</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Active paid subscribers</div>
          <div class="stat-card-value">${stats.activePaid}</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Trial → paid conversion</div>
          <div class="stat-card-value">${rateDisplay}</div>
          <div style="font-size:0.72rem;color:var(--periwinkle);margin-top:0.3rem;">${rateNote}</div>
        </div>
      `;
    }

    let adminPassword = '';
    let allUsers = [];
    let allLogs = [];
    let usersSort = 'created';
    let logsFilter = 'all';
    let dashPeriod = 'all';
    let logsLoaded = false;

    async function checkPassword() {
      const password = document.getElementById('password-input').value;
      const errorEl = document.getElementById('gate-error');
      errorEl.style.display = 'none';

      // Verify the password with a lightweight dashboard fetch rather
      // than pre-loading users data here -- keeps "fetch" and "render"
      // always paired together in switchPanel, with no risk of data
      // being fetched once but never actually drawn to the page.
      const dashResult = await fetchFromServer('dashboard', password, dashPeriod);

      if (dashResult === null) {
        errorEl.style.display = 'block';
        return;
      }

      adminPassword = password;

      document.getElementById('gate').style.display = 'none';
      document.getElementById('app').style.display = 'block';

      renderDashboard(dashResult.dashboard);

      // Load v2 (sandbox) stats too, same password reused
      const v2Result = await fetchV2Dashboard(dashV2Period);
      renderDashboardV2(v2Result ? v2Result.dashboard : null);
    }

    async function fetchFromServer(view, passwordOverride, period) {
      try {
        const response = await fetch(EDGE_FUNCTION_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${SUPABASE_PUBLISHABLE_KEY}`,
            'apikey': SUPABASE_PUBLISHABLE_KEY,
          },
          body: JSON.stringify({ password: passwordOverride || adminPassword, view, period }),
        });

        if (!response.ok) return null;
        return await response.json();
      } catch (err) {
        return null;
      }
    }

    async function switchPanel(panel) {
      document.getElementById('nav-dashboard').classList.toggle('active', panel === 'dashboard');
      document.getElementById('nav-users').classList.toggle('active', panel === 'users');
      document.getElementById('nav-logs').classList.toggle('active', panel === 'logs');
      document.getElementById('panel-dashboard').classList.toggle('active', panel === 'dashboard');
      document.getElementById('panel-users').classList.toggle('active', panel === 'users');
      document.getElementById('panel-logs').classList.toggle('active', panel === 'logs');

      if (panel === 'users' && allUsers.length === 0) {
        document.getElementById('user-list').innerHTML = '<tr><td colspan="6" class="loading">Loading users...</td></tr>';
        const result = await fetchFromServer('users');
        if (result) {
          allUsers = result.users || [];
          renderUsers();
        }
      }

      if (panel === 'logs' && !logsLoaded) {
        document.getElementById('log-list').innerHTML = '<tr><td colspan="6" class="loading">Loading email logs...</td></tr>';
        const result = await fetchFromServer('logs');
        if (result) {
          allLogs = result.logs || [];
          logsLoaded = true;
          renderLogs();
        }
      }
    }

    async function setDashPeriod(period) {
      dashPeriod = period;
      ['day', 'week', 'month', 'all'].forEach(p => {
        document.getElementById(`dash-period-${p}`).classList.toggle('active', p === period);
      });
      document.getElementById('dash-stat-grid').innerHTML = '<div class="loading">Loading dashboard...</div>';
      const result = await fetchFromServer('dashboard', null, period);
      if (result) {
        renderDashboard(result.dashboard);
      }
    }

    function renderDashboard(stats) {
      const gridEl = document.getElementById('dash-stat-grid');
      if (!stats) {
        gridEl.innerHTML = '<div class="empty">Couldn\'t load dashboard stats.</div>';
        return;
      }

      const rateClass = stats.successRate === null
        ? ''
        : stats.successRate >= 95 ? 'stat-good' : stats.successRate < 80 ? 'stat-bad' : '';

      gridEl.innerHTML = `
        <div class="stat-card">
          <div class="stat-card-label">Active subscribers</div>
          <div class="stat-card-value">${stats.activeSubscribers}</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Unsubscribed</div>
          <div class="stat-card-value">${stats.inactiveSubscribers}</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">New signups</div>
          <div class="stat-card-value">${stats.newSignups}</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Emails sent</div>
          <div class="stat-card-value">${stats.emailsSent}</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Emails failed</div>
          <div class="stat-card-value ${stats.emailsFailed > 0 ? 'stat-bad' : ''}">${stats.emailsFailed}</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Success rate</div>
          <div class="stat-card-value ${rateClass}">${stats.successRate === null ? '—' : stats.successRate + '%'}</div>
        </div>
      `;
    }

    function setLogsFilter(filter) {
      logsFilter = filter;
      document.getElementById('logs-filter-all').classList.toggle('active', filter === 'all');
      document.getElementById('logs-filter-failed').classList.toggle('active', filter === 'failed');
      renderLogs();
    }

    function renderLogs() {
      const listEl = document.getElementById('log-list');

      let filtered = allLogs;
      if (logsFilter === 'failed') {
        filtered = allLogs.filter(l => l.status === 'failed');
      }

      if (!filtered || filtered.length === 0) {
        listEl.innerHTML = `<tr><td colspan="6" class="empty">${logsFilter === 'failed' ? 'No failed sends.' : 'No email logs yet.'}</td></tr>`;
        return;
      }

      listEl.innerHTML = filtered.map((log, i) => {
        const date = new Date(log.created_at).toLocaleDateString('en-US', {
          month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit'
        });

        const parent = log.children;
        const parentName = parent && parent.parent_first_name
          ? `${parent.parent_first_name} ${parent.parent_last_name || ''}`.trim()
          : log.child_name; // fall back to child name if parent info isn't linked

        const statusBadge = log.status === 'success'
          ? '<span class="badge badge-active">Sent</span>'
          : '<span class="badge badge-inactive">Failed</span>';
        const typeBadge = log.send_type === 'welcome'
          ? '<span class="badge badge-welcome">Welcome</span>'
          : '<span class="badge badge-nightly">Nightly</span>';

        const resendBtn = log.child_id
          ? `<button class="resend-btn" onclick="event.stopPropagation(); resendEmail('${log.id}', '${log.child_id}')" id="resend-btn-${log.id}">Resend</button>`
          : '';

        const mainRow = `
          <tr class="${log.status === 'failed' ? 'log-row-error' : ''}" onclick="toggleItem('log-detail-${i}')" style="cursor: pointer;">
            <td class="log-name">${escapeHtml(parentName)}</td>
            <td class="log-email">${escapeHtml(log.parent_email)}</td>
            <td>${typeBadge}</td>
            <td>${statusBadge}</td>
            <td class="log-date">${date}</td>
            <td>${resendBtn}</td>
          </tr>
        `;

        // Successful sends with a linked story: show the scrollable email
        // content. Failed sends (or any row with no linked story): show
        // the error message instead, same as before.
        const story = log.stories;
        const expandedContent = story && story.story_text
          ? `<div class="email-content-scroll">${escapeHtml(story.story_text)}</div>`
          : log.error_message
            ? `<div class="error-block">${escapeHtml(log.error_message)}</div>`
            : `<div class="empty" style="padding: 1rem 0;">No content available for this entry.</div>`;

        const detailRow = `
          <tr>
            <td colspan="6" style="padding: 0;">
              <div class="item-full" id="log-detail-${i}" style="margin: 0; padding: 0.75rem 0.9rem;">
                ${expandedContent}
              </div>
            </td>
          </tr>
        `;

        return mainRow + detailRow;
      }).join('');
    }

    async function resendEmail(logId, childId) {
      const btn = document.getElementById(`resend-btn-${logId}`);
      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        const response = await fetch(RESEND_FUNCTION_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${SUPABASE_PUBLISHABLE_KEY}`,
            'apikey': SUPABASE_PUBLISHABLE_KEY,
          },
          body: JSON.stringify({ password: adminPassword, child_id: childId }),
        });

        const result = await response.json();

        if (!response.ok) {
          btn.textContent = 'Failed';
          alert(result.error || 'Resend failed. Check the logs tab in a moment for details.');
          setTimeout(() => { btn.disabled = false; btn.textContent = 'Resend'; }, 2000);
          return;
        }

        btn.textContent = 'Sent!';
        // Refresh logs after a short pause so the new log entry is visible
        setTimeout(async () => {
          const refreshed = await fetchFromServer('logs');
          if (refreshed) {
            allLogs = refreshed.logs || [];
            renderLogs();
          }
        }, 1500);

      } catch (err) {
        btn.textContent = 'Failed';
        alert('Something went wrong. Please try again.');
        setTimeout(() => { btn.disabled = false; btn.textContent = 'Resend'; }, 2000);
      }
    }

    let usersSortDirection = 'desc'; // 'created' defaults to newest-first (desc)

    const usersSortDefaults = {
      created: 'desc',
      nextsend: 'asc',
      name: 'asc',
      email: 'asc',
    };

    function setUsersSort(sort) {
      if (usersSort === sort) {
        usersSortDirection = usersSortDirection === 'asc' ? 'desc' : 'asc';
      } else {
        usersSortDirection = usersSortDefaults[sort];
      }
      usersSort = sort;

      ['created', 'name', 'email', 'nextsend'].forEach(s => {
        document.getElementById(`users-sort-${s}`).classList.toggle('active', sort === s);
      });

      const arrow = usersSortDirection === 'asc' ? '↑' : '↓';
      document.getElementById('users-sort-created').textContent = `Date Created ${sort === 'created' ? arrow : '↓'}`;
      document.getElementById('users-sort-name').textContent = `Name ${sort === 'name' && usersSortDirection === 'desc' ? 'Z–A' : 'A–Z'}`;
      document.getElementById('users-sort-email').textContent = `Email ${sort === 'email' && usersSortDirection === 'desc' ? 'Z–A' : 'A–Z'}`;
      document.getElementById('users-sort-nextsend').textContent = `Next Send ${sort === 'nextsend' ? arrow : '↑'}`;

      renderUsers();
    }

    function daysSince(dateStr) {
      const then = new Date(dateStr);
      const now = new Date();
      const diffMs = now - then;
      const days = Math.floor(diffMs / (1000 * 60 * 60 * 24));
      if (days < 1) return 'Today';
      if (days === 1) return '1 day';
      return `${days} days`;
    }

    function formatNextSend(dateStr) {
      if (!dateStr) return 'Not scheduled';
      return new Date(dateStr).toLocaleString('en-US', {
        timeZone: 'America/New_York',
        month: 'short',
        day: 'numeric',
        hour: 'numeric',
        minute: '2-digit',
      }) + ' ET';
    }

    function formatDateCreated(dateStr) {
      if (!dateStr) return '—';
      return new Date(dateStr).toLocaleString('en-US', {
        timeZone: 'America/New_York',
        month: 'short',
        day: 'numeric',
        year: 'numeric',
        hour: 'numeric',
        minute: '2-digit',
      }) + ' ET';
    }

    function renderUsers() {
      const listEl = document.getElementById('user-list');

      if (!allUsers || allUsers.length === 0) {
        listEl.innerHTML = '<tr><td colspan="6" class="empty">No users yet.</td></tr>';
        return;
      }

      // Pre-compute display name once per user, since both search and
      // the "Name A-Z" sort need it.
      const withNames = allUsers.map(user => ({
        ...user,
        _displayName: `${user.parent_first_name || ''} ${user.parent_last_name || ''}`.trim() || 'Unnamed parent',
      }));

      const searchTerm = (document.getElementById('users-search').value || '').trim().toLowerCase();
      const filtered = searchTerm
        ? withNames.filter(u =>
            u._displayName.toLowerCase().includes(searchTerm) ||
            (u.parent_email || '').toLowerCase().includes(searchTerm)
          )
        : withNames;

      if (filtered.length === 0) {
        listEl.innerHTML = '<tr><td colspan="6" class="empty">No users match that search.</td></tr>';
        return;
      }

      const sorted = [...filtered].sort((a, b) => {
        if (usersSort === 'name') {
          const cmp = a._displayName.localeCompare(b._displayName);
          return usersSortDirection === 'desc' ? -cmp : cmp;
        }
        if (usersSort === 'email') {
          const cmp = (a.parent_email || '').localeCompare(b.parent_email || '');
          return usersSortDirection === 'desc' ? -cmp : cmp;
        }
        if (usersSort === 'nextsend') {
          const diff = new Date(a.next_send_at || 0) - new Date(b.next_send_at || 0);
          return usersSortDirection === 'desc' ? -diff : diff;
        }
        // 'created'
        const diff = new Date(a.created_at) - new Date(b.created_at);
        return usersSortDirection === 'desc' ? -diff : diff;
      });

      listEl.innerHTML = sorted.map((user, i) => {
        const parentName = user._displayName;
        const statusBadge = user.active
          ? '<span class="badge badge-active">Active</span>'
          : '<span class="badge badge-inactive">Inactive</span>';
        const themes = (user.theme_tags || []).join(', ') || 'None given';

        const mainRow = `
          <tr onclick="toggleItem('user-${i}')" style="cursor: pointer;">
            <td class="log-name">${escapeHtml(parentName)}</td>
            <td class="log-email">${escapeHtml(user.parent_email)}</td>
            <td>${statusBadge}</td>
            <td>${user.story_count} ${user.story_count === 1 ? 'story' : 'stories'}</td>
            <td class="log-date">${formatDateCreated(user.created_at)}</td>
            <td class="log-date">${formatNextSend(user.next_send_at)}</td>
          </tr>
        `;

        const detailRow = `
          <tr>
            <td colspan="6" style="padding: 0;">
              <div class="item-full" id="user-${i}" style="margin: 0; padding: 0 0.9rem;">
                <div class="detail-row"><span class="detail-label">Child's name</span><span class="detail-value">${escapeHtml(user.child_name)}</span></div>
                <div class="detail-row"><span class="detail-label">Age</span><span class="detail-value">${user.child_age}</span></div>
                <div class="detail-row"><span class="detail-label">Favorite color</span><span class="detail-value">${escapeHtml(user.favorite_color || 'Not given')}</span></div>
                <div class="detail-row"><span class="detail-label">Favorite animal</span><span class="detail-value">${escapeHtml(user.favorite_animal || 'Not given')}</span></div>
                <div class="detail-row"><span class="detail-label">Things they love</span><span class="detail-value">${escapeHtml(themes)}</span></div>
                <div class="detail-row"><span class="detail-label">Time zone</span><span class="detail-value">${escapeHtml(user.timezone)}</span></div>
                <div class="detail-row"><span class="detail-label">Next story</span><span class="detail-value">${formatNextSend(user.next_send_at)}</span></div>
                <div class="detail-row"><span class="detail-label">Stories generated</span><span class="detail-value">${user.story_count}</span></div>
                <div class="detail-row"><span class="detail-label">Subscribed since</span><span class="detail-value">${new Date(user.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })} (${daysSince(user.created_at)} ago)</span></div>
                <button class="copy-link-btn" id="copy-btn-${i}" onclick="event.stopPropagation(); copyPreferencesLink('${user.id}', ${i})">Copy update-preferences link</button>
                ${user.active
                  ? `<button class="unsubscribe-btn" id="unsub-btn-${i}" onclick="event.stopPropagation(); unsubscribeUser('${user.id}', ${i}, '${escapeHtml(user.child_name)}')">Unsubscribe from emails</button>`
                  : `<div class="already-inactive">This child is already unsubscribed.</div>`
                }
              </div>
            </td>
          </tr>
        `;

        return mainRow + detailRow;
      }).join('');
    }

    async function unsubscribeUser(childId, i, childName) {
      const confirmed = confirm(`Unsubscribe ${childName} from StoryTrail emails? They'll stop receiving nightly stories until reactivated.`);
      if (!confirmed) return;

      const btn = document.getElementById(`unsub-btn-${i}`);
      btn.disabled = true;
      btn.textContent = 'Unsubscribing...';

      try {
        const response = await fetch(UNSUBSCRIBE_FUNCTION_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${SUPABASE_PUBLISHABLE_KEY}`,
            'apikey': SUPABASE_PUBLISHABLE_KEY,
          },
          body: JSON.stringify({ password: adminPassword, child_id: childId }),
        });

        const result = await response.json();

        if (!response.ok) {
          alert(result.error || 'Something went wrong. Please try again.');
          btn.disabled = false;
          btn.textContent = 'Unsubscribe from emails';
          return;
        }

        // Refresh the users list so the row reflects the new inactive status
        const refreshed = await fetchFromServer('users');
        if (refreshed) {
          allUsers = refreshed.users || [];
          renderUsers();
        }

      } catch (err) {
        alert('Something went wrong. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Unsubscribe from emails';
      }
    }

    function copyPreferencesLink(childId, i) {
      const link = `https://storytrail.shop/update-preferences?id=${childId}`;
      navigator.clipboard.writeText(link).then(() => {
        const btn = document.getElementById(`copy-btn-${i}`);
        const originalText = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = originalText; }, 1500);
      });
    }

    function toggleItem(id) {
      const el = document.getElementById(id);
      el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    document.getElementById('password-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') checkPassword();
    });
  </script>
</body>
</html>
